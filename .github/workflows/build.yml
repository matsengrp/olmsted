name: build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Checkout tags
        run: |
          git fetch --unshallow origin +refs/tags/*:refs/tags/* || git fetch origin +refs/tags/*:refs/tags/*
      - name: Set git branch variable
        run: echo "BRANCH=$(git branch --show-current)" >> $GITHUB_ENV
      - name: Set image tag variable
        run: if [ "$BRANCH" == "main" ] || [ "$BRANCH" == "" ];then echo "TAG=$(git describe --tags)" >> $GITHUB_ENV;else echo "TAG=${BRANCH//\//-}" >> $GITHUB_ENV;fi
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Run tests
        run: npm test -- --ci --coverage
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: npx playwright test
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
      - name: Build the Docker image
        run: |
          # Retry logic for transient quay registry failures (502 Bad Gateway, rate limits)
          for i in 1 2 3; do
            echo "Build attempt $i of 3..."
            if docker build . -t quay.io/matsengrp/olmsted:$TAG; then
              echo "Build succeeded on attempt $i"
              exit 0
            fi
            if [ $i -lt 3 ]; then
              echo "Build failed, waiting 30 seconds before retry..."
              sleep 30
            fi
          done
          echo "Build failed after 3 attempts"
          exit 1
      - name: Run example in the Docker image
        run: docker run --rm -p 8080:3999 quay.io/matsengrp/olmsted:$TAG & sleep 20 && curl -I localhost:8080
      - name: Login to Registry
        run: docker login quay.io -u ${{ secrets.QUAY_USERNAME }} --password ${{ secrets.QUAY_PASSWORD }}
      - name: publish to Registry
        run: docker push quay.io/matsengrp/olmsted:$TAG && docker tag quay.io/matsengrp/olmsted:$TAG quay.io/matsengrp/olmsted:latest && docker push quay.io/matsengrp/olmsted:latest
      - name: Slack Notification
        if: failure()
        uses: slackapi/slack-github-action@v3
        with:
          webhook: ${{ secrets.SLACK_NOTIFICATION_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            text: ":x: Olmsted *build* failed on `${{ github.ref_name }}` — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|run ${{ github.run_id }}> (commit ${{ github.sha }})"
